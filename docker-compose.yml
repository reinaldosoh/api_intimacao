version: "3.8"

services:
  jurisrapido:
    build:
      context: ./automation
      dockerfile: Dockerfile
    container_name: jurisrapido-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DOCKER=true
    volumes:
      - resultados:/app/resultados
    shm_size: "2gb"

volumes:
  resultados:
